<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 50">
    <!-- Logomark: encoded rules grid — 3x3 matrix with selective fills -->
    <g transform="translate(6, 7)">
        <!-- Grid cells — representing encoded/structured rules -->
        <rect x="0" y="0" width="10" height="10" rx="1.5" fill="#0d7c66"/>
        <rect x="13" y="0" width="10" height="10" rx="1.5" fill="#0d7c66" opacity="0.5"/>
        <rect x="26" y="0" width="10" height="10" rx="1.5" fill="#0d7c66"/>
        <rect x="0" y="13" width="10" height="10" rx="1.5" fill="#0d7c66" opacity="0.5"/>
        <rect x="13" y="13" width="10" height="10" rx="1.5" fill="#0d7c66"/>
        <rect x="26" y="13" width="10" height="10" rx="1.5" fill="#0d7c66" opacity="0.5"/>
        <rect x="0" y="26" width="10" height="10" rx="1.5" fill="#0d7c66"/>
        <rect x="13" y="26" width="10" height="10" rx="1.5" fill="#0d7c66" opacity="0.5"/>
        <rect x="26" y="26" width="10" height="10" rx="1.5" fill="#0d7c66"/>
    </g>
    <!-- Text -->
    <text x="52" y="24" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="600" letter-spacing="-0.5" fill="#111111">Rules</text>
    <text x="52" y="41" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#0d7c66" textLength="50" lengthAdjust="spacing">ATLAS</text>
</svg>
